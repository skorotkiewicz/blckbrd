<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wood Frame -->
  <rect x="5" y="5" width="90" height="90" rx="8" fill="#5c4033" />
  
  <!-- Chalkboard Surface -->
  <rect x="12" y="12" width="76" height="76" rx="4" fill="#2b3a32" />
  
  <!-- Chalk Markings -->
  <path d="M 30 40 Q 50 20 70 40 T 50 60 Q 30 80 50 70" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linecap="round" />
  <circle cx="40" cy="50" r="3" fill="rgba(255,255,255,0.8)" />
  <circle cx="60" cy="50" r="3" fill="rgba(255,255,255,0.8)" />
  
  <!-- Eraser Marks (Subtle) -->
  <path d="M 20 20 L 80 80 M 80 20 L 20 80" stroke="rgba(255,255,255,0.1)" stroke-width="8" stroke-linecap="round" />
</svg>
